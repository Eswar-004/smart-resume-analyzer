<!DOCTYPE html>
<html>
    <head>
        <title>Upload page</title>
    </head>
    <body>
        <h1>UPLOAD YOUR RESUME</h1>
        <p>Select pdf within 2mb</p>
        <form action="/upload" method='POST' enctype="multipart/form-data">
            <LABEL>Click to upload</LABEL><br>
            <input type="file" name="resume"><br>
            <textarea name="job_description" rows="10" cols="60" placeholder="Paste job description here..." required></textarea>
            <button type="submit">Submit</button>
        </form>
    </body>
</html>
